<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI日报 VOL.{{VOL}} - {{DATE_FULL}}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #1a1a1a;
            padding: 20px;
        }
        .card {
            width: 1080px;
            min-height: 1080px;
            background: #ffffff;
            padding: 50px 60px;
            position: relative;
            box-shadow: 0 50px 100px rgba(0,0,0,0.5);
        }
        .masthead {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #000;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            font-weight: 900;
            letter-spacing: -1px;
            color: #000;
        }
        .logo span { color: #ff3b30; }
        .issue-info { text-align: right; }
        .volume {
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            color: #666;
            letter-spacing: 1px;
        }
        .date {
            font-family: 'JetBrains Mono', monospace;
            font-size: 16px;
            color: #000;
            font-weight: 500;
        }
        .headline-section { margin-bottom: 35px; }
        .section-label {
            font-size: 12px;
            font-weight: 700;
            color: #ff3b30;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 12px;
        }
        .headline {
            font-family: 'Playfair Display', serif;
            font-size: 46px;
            font-weight: 700;
            line-height: 1.15;
            color: #000;
            margin-bottom: 15px;
        }
        .dek {
            font-size: 17px;
            color: #333;
            line-height: 1.55;
            font-weight: 400;
        }
        .stories-section { margin-bottom: 40px; }
        .story {
            display: grid;
            grid-template-columns: 50px 1fr;
            gap: 15px;
            padding: 22px 0;
            border-bottom: 1px solid #e0e0e0;
        }
        .story:last-child { border-bottom: none; }
        .story-number {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            font-weight: 500;
            color: #999;
            padding-top: 3px;
        }
        .story-tag {
            display: inline-block;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 3px 8px;
            border-radius: 3px;
            margin-bottom: 8px;
        }
        /* 标签背景色（内联，不使用 class 引用） */
        .story-title {
            font-family: 'Playfair Display', serif;
            font-size: 21px;
            font-weight: 700;
            color: #000;
            line-height: 1.3;
            margin-bottom: 8px;
        }
        .story-body {
            font-size: 14.5px;
            color: #444;
            line-height: 1.65;
            margin-bottom: 8px;
        }
        .story-why {
            font-size: 13px;
            color: #888;
            font-style: italic;
        }
        .story-source {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: #aaa;
            margin-top: 6px;
        }
        .footer {
            border-top: 3px solid #000;
            padding-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .footer-left { font-size: 12px; color: #999; }
        .footer-right {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: #ff3b30;
            font-weight: 500;
        }
        .divider {
            height: 3px;
            background: linear-gradient(90deg, #ff3b30 0%, #ff6b35 100%);
            margin-bottom: 30px;
            width: 60px;
        }
    </style>
</head>
<body>
<div class="card">
    <!-- Masthead -->
    <div class="masthead">
        <div class="logo">AI日报 <span>·</span> 资讯版</div>
        <div class="issue-info">
            <div class="volume">VOL.{{VOL}}</div>
            <div class="date">{{DATE_FULL}}</div>
        </div>
    </div>

    <!-- Headline -->
    <div class="headline-section">
        <div class="section-label">今日头条</div>
        <div class="headline">{{HEADLINE}}</div>
        <div class="dek">{{HEADLINE_DESC}}</div>
    </div>

    <div class="divider"></div>

    <!-- Stories -->
    <div class="stories-section">
        <div class="section-label">{{STORY_COUNT}} 条核心资讯</div>

        <!-- 模板行（复制 N 份，每条替换占位符） -->
        <!--
        <div class="story">
            <div class="story-number">{{NO}}</div>
            <div class="story-content">
                <span class="story-tag" style="background:{{TAG_BG}};color:{{TAG_TEXT}};">{{TAG_LABEL}}</span>
                <div class="story-title">{{STORY_TITLE}}</div>
                <div class="story-body">{{STORY_BODY}}</div>
                <div class="story-why">{{STORY_WHY}}</div>
                <div class="story-source">&#9658; {{SOURCE}} · {{DATE}}</div>
            </div>
        </div>
        -->
    </div>

    <!-- Footer -->
    <div class="footer">
        <div class="footer-left">
            {{STORY_COUNT}}条精选 · 信源经可靠性核验 · 仅供参考，不构成投资建议
        </div>
        <div class="footer-right">AI日报 VOL.{{VOL}} · {{DATE_SHORT}}</div>
    </div>
</div>
</body>
</html>
